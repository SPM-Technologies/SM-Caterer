<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    Report Header Fragment
    Include this in report templates for consistent branding
    Usage: <div th:replace="~{fragments/report-header :: header}"></div>
-->
<body>
    <!-- Report Header with Branding -->
    <div th:fragment="header" class="report-header mb-4 pb-3 border-bottom">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <!-- Logo -->
                <div th:if="${tenantHasLogo}" class="me-3">
                    <img th:src="@{'/uploads/logos/' + ${#strings.substringAfter(tenantLogoPath, 'logos/')}}"
                         alt="Logo" style="max-height: 60px;">
                </div>
                <div th:unless="${tenantHasLogo}" class="me-3">
                    <i class="bi bi-building fs-1" th:style="'color: ' + (${tenantPrimaryColor} ?: '#3498db')"></i>
                </div>
                <!-- Company Info -->
                <div>
                    <h4 class="mb-0" th:text="${tenantDisplayName} ?: 'SM-Caterer'">Company Name</h4>
                    <small th:if="${tenantTagline}" class="text-muted" th:text="${tenantTagline}"></small>
                </div>
            </div>
            <div class="text-end text-muted">
                <small th:text="${#temporals.format(#temporals.createNow(), 'dd MMM yyyy HH:mm')}">Date</small>
            </div>
        </div>
    </div>

    <!-- Print-specific Report Header -->
    <div th:fragment="print-header" class="print-header d-none d-print-block mb-4 pb-3 border-bottom">
        <div class="row">
            <div class="col-8">
                <h3 th:text="${tenantDisplayName} ?: 'SM-Caterer'">Company Name</h3>
                <p th:if="${tenantTagline}" class="text-muted mb-0" th:text="${tenantTagline}"></p>
            </div>
            <div class="col-4 text-end">
                <small class="text-muted">
                    Printed: <span th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm')}"></span>
                </small>
            </div>
        </div>
    </div>

    <!-- Report Title Fragment -->
    <div th:fragment="title(reportTitle)" class="report-title mb-4">
        <h2 class="h4">
            <i class="bi bi-file-earmark-bar-graph me-2" th:style="'color: ' + (${tenantPrimaryColor} ?: '#3498db')"></i>
            <span th:text="${reportTitle}">Report Title</span>
        </h2>
    </div>

    <!-- Report Footer Fragment (for PDF/Print) -->
    <div th:fragment="footer" class="report-footer mt-4 pt-3 border-top text-center text-muted d-none d-print-block">
        <small>
            <span th:text="${tenantDisplayName} ?: 'SM-Caterer'">Company Name</span>
            <span th:if="${tenantTagline}"> | <span th:text="${tenantTagline}"></span></span>
        </small>
    </div>
</body>
</html>
