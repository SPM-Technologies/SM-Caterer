<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="#{admin.users}">User Management</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-0"><i class="bi bi-people"></i> <span th:text="#{admin.users}">User Management</span></h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin}" th:text="#{admin.title}">Admin</a></li>
                    <li class="breadcrumb-item active" th:text="#{admin.users}">Users</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">
            <i class="bi bi-person-plus"></i> <span th:text="#{admin.users.add}">Add User</span>
        </a>
    </div>

    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/admin/users}" method="get" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label" th:text="#{admin.users.tenant}">Tenant</label>
                    <select name="tenantId" class="form-select">
                        <option value="" th:text="#{admin.users.allTenants}">All Tenants</option>
                        <option th:each="t : ${tenants}" th:value="${t.id}" th:text="${t.businessName}" th:selected="${t.id == tenantId}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label" th:text="#{admin.users.role}">Role</label>
                    <select name="role" class="form-select">
                        <option value="" th:text="#{admin.users.allRoles}">All Roles</option>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="#{'role.' + ${r}}" th:selected="${r == role}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label" th:text="#{admin.users.status}">Status</label>
                    <select name="status" class="form-select">
                        <option value="" th:text="#{common.all}">All</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="#{'status.' + ${s}}" th:selected="${s == status}"></option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary me-2">
                        <i class="bi bi-search"></i> <span th:text="#{common.filter}">Filter</span>
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle"></i> <span th:text="#{common.clear}">Clear</span>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Results -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-transparent">
            <span th:text="#{common.totalRecords}">Total Records</span>: <strong th:text="${totalItems}">0</strong>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th th:text="#{admin.users.username}">Username</th>
                            <th th:text="#{admin.users.name}">Name</th>
                            <th th:text="#{admin.users.email}">Email</th>
                            <th th:text="#{admin.users.tenant}">Tenant</th>
                            <th th:text="#{admin.users.role}">Role</th>
                            <th th:text="#{admin.users.status}">Status</th>
                            <th th:text="#{admin.users.lastLogin}">Last Login</th>
                            <th th:text="#{common.actions}">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td>
                                <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" th:text="${user.username}" class="text-decoration-none fw-semibold"></a>
                            </td>
                            <td th:text="${user.firstName + ' ' + user.lastName}">-</td>
                            <td th:text="${user.email}">-</td>
                            <td th:text="${user.tenantName}">-</td>
                            <td>
                                <span class="badge" th:classappend="${user.role.name() == 'SUPER_ADMIN' ? 'bg-danger' : (user.role.name() == 'TENANT_ADMIN' ? 'bg-primary' : (user.role.name() == 'MANAGER' ? 'bg-info' : 'bg-secondary'))}" th:text="#{'role.' + ${user.role}}">-</span>
                            </td>
                            <td>
                                <span class="badge" th:classappend="${user.status.name() == 'ACTIVE' ? 'bg-success' : (user.status.name() == 'LOCKED' ? 'bg-danger' : 'bg-secondary')}" th:text="#{'status.' + ${user.status}}">-</span>
                            </td>
                            <td th:text="${user.lastLogin != null ? #temporals.format(user.lastLogin, 'dd-MM-yyyy HH:mm') : '-'}">-</td>
                            <td>
                                <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-outline-primary" th:title="#{common.edit}">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="d-inline" th:attr="onsubmit=|return confirm('#{common.confirmDelete}')|">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" th:title="#{common.delete}">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="8" class="text-center py-4 text-muted">
                                <i class="bi bi-inbox fs-3"></i>
                                <p class="mb-0 mt-2" th:text="#{admin.users.noRecords}">No users found</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div th:replace="~{fragments/pagination :: pagination(baseUrl='/admin/users', currentPage=${currentPage}, totalPages=${totalPages}, pageSize=${pageSize}, sortBy=${sortBy}, sortDir=${sortDir})}"></div>
</div>
</body>
</html>
