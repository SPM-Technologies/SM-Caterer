<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="#{admin.dashboard.title}">Admin Dashboard</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-0"><i class="bi bi-shield-lock"></i> <span th:text="#{admin.dashboard.title}">Admin Dashboard</span></h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}" th:text="#{nav.dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item active" th:text="#{common.breadcrumb.admin}">Admin</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm bg-primary text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title mb-0" th:text="#{admin.dashboard.totalTenants}">Total Tenants</h6>
                            <h2 class="mb-0" th:text="${totalTenants}">0</h2>
                        </div>
                        <i class="bi bi-building fs-1 opacity-50"></i>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0">
                    <a th:href="@{/admin/tenants}" class="text-white text-decoration-none">
                        <span th:text="#{admin.dashboard.viewAll}">View All</span> <i class="bi bi-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm bg-success text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title mb-0" th:text="#{admin.dashboard.activeTenants}">Active Tenants</h6>
                            <h2 class="mb-0" th:text="${activeTenants}">0</h2>
                        </div>
                        <i class="bi bi-check-circle fs-1 opacity-50"></i>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0">
                    <a th:href="@{/admin/tenants(status='ACTIVE')}" class="text-white text-decoration-none">
                        <span th:text="#{admin.dashboard.viewActive}">View Active</span> <i class="bi bi-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm bg-info text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title mb-0" th:text="#{admin.dashboard.totalUsers}">Total Users</h6>
                            <h2 class="mb-0" th:text="${totalUsers}">0</h2>
                        </div>
                        <i class="bi bi-people fs-1 opacity-50"></i>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0">
                    <a th:href="@{/admin/users}" class="text-white text-decoration-none">
                        <span th:text="#{admin.dashboard.viewAll}">View All</span> <i class="bi bi-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-transparent">
                    <h5 class="mb-0"><i class="bi bi-lightning"></i> <span th:text="#{admin.dashboard.quickActions}">Quick Actions</span></h5>
                </div>
                <div class="card-body">
                    <a th:href="@{/admin/tenants/new}" class="btn btn-primary me-2">
                        <i class="bi bi-plus-lg"></i> <span th:text="#{admin.dashboard.newTenant}">New Tenant</span>
                    </a>
                    <a th:href="@{/admin/users/new}" class="btn btn-success me-2">
                        <i class="bi bi-person-plus"></i> <span th:text="#{admin.dashboard.newUser}">New User</span>
                    </a>
                    <a th:href="@{/admin/tenants}" class="btn btn-outline-primary me-2">
                        <i class="bi bi-building"></i> <span th:text="#{admin.dashboard.manageTenants}">Manage Tenants</span>
                    </a>
                    <a th:href="@{/admin/users}" class="btn btn-outline-success">
                        <i class="bi bi-people"></i> <span th:text="#{admin.dashboard.manageUsers}">Manage Users</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Tenants -->
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-transparent d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-clock-history"></i> <span th:text="#{admin.dashboard.recentTenants}">Recent Tenants</span></h5>
                    <a th:href="@{/admin/tenants}" class="btn btn-sm btn-outline-primary" th:text="#{admin.dashboard.viewAll}">View All</a>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th th:text="#{admin.dashboard.code}">Code</th>
                                    <th th:text="#{admin.dashboard.businessName}">Business Name</th>
                                    <th th:text="#{admin.dashboard.contact}">Contact</th>
                                    <th th:text="#{admin.dashboard.status}">Status</th>
                                    <th th:text="#{admin.dashboard.subscriptionEnd}">Subscription End</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="tenant : ${recentTenants}">
                                    <td>
                                        <a th:href="@{/admin/tenants/{id}/edit(id=${tenant.id})}" th:text="${tenant.tenantCode}" class="text-decoration-none fw-semibold"></a>
                                    </td>
                                    <td th:text="${tenant.businessName}">-</td>
                                    <td th:text="${tenant.contactPerson}">-</td>
                                    <td>
                                        <span class="badge" th:classappend="${tenant.status.name() == 'ACTIVE' ? 'bg-success' : (tenant.status.name() == 'SUSPENDED' ? 'bg-warning' : 'bg-secondary')}" th:text="${tenant.status}">-</span>
                                    </td>
                                    <td th:text="${tenant.subscriptionEndDate != null ? #temporals.format(tenant.subscriptionEndDate, 'dd-MM-yyyy') : '-'}">-</td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(recentTenants)}">
                                    <td colspan="5" class="text-center py-4 text-muted">
                                        <i class="bi bi-inbox fs-3"></i>
                                        <p class="mb-0 mt-2" th:text="#{admin.dashboard.noTenants}">No tenants found</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
